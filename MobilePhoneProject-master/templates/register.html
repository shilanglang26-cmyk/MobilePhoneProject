<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机配件销售系统 - 注册账号</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .register-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .register-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 40px 30px;
            position: relative;
        }
        .register-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #28a745, #20c997);
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h2 {
            color: #333;
            font-size: 24px;
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.1);
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
            margin-bottom: 20px;
        }
        .sms-code {
            display: flex;
            gap: 10px;
        }
        .sms-code .form-control {
            flex: 1;
        }
        .btn-sms {
            width: 130px;
            height: 45px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-sms:hover {
            background: #eee;
        }
        .btn-sms.disabled {
            background: #eee;
            color: #999;
            cursor: not-allowed;
        }
        .form-agree {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        .form-agree input {
            margin-right: 8px;
        }
        .form-agree label {
            margin-bottom: 0;
            color: #666;
            font-size: 14px;
        }
        .form-agree a {
            color: #28a745;
            text-decoration: none;
        }
        .btn-register {
            width: 100%;
            height: 48px;
            background: linear-gradient(90deg, #28a745, #20c997);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn-register:hover {
            opacity: 0.9;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .login-link a {
            color: #28a745;
            text-decoration: none;
            font-weight: bold;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #dc3545;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        @media (max-width: 576px) {
            .register-card {
                padding: 30px 20px;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .sms-code .btn-sms {
                width: 110px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="logo">
                <h2>手机配件销售系统 - 注册账号</h2>
            </div>
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" class="form-control" placeholder="请输入3-20位用户名" required>
                        <div class="error-message" id="usernameError">用户名长度必须在3-20位之间</div>
                    </div>
                    <div class="form-group">
                        <label for="phone">手机号</label>
                        <input type="tel" id="phone" class="form-control" placeholder="请输入11位手机号" required>
                        <div class="error-message" id="phoneError">请输入有效的11位手机号</div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">邮箱（可选）</label>
                    <input type="email" id="email" class="form-control" placeholder="请输入邮箱地址">
                    <div class="error-message" id="emailError">请输入有效的邮箱地址</div>
                </div>
                <div class="sms-code">
                    <div class="form-group" style="margin-bottom: 0; flex: 1;">
                        <label for="smsCode">短信验证码</label>
                        <input type="text" id="smsCode" class="form-control" placeholder="请输入6位验证码" required>
                        <div class="error-message" id="smsCodeError">请输入有效的6位验证码</div>
                    </div>
                    <button type="button" class="btn-sms" id="btnSms">获取验证码</button>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" class="form-control" placeholder="请输入6-20位密码" required>
                        <div class="error-message" id="passwordError">密码长度必须在6-20位之间</div>
                    </div>
                    <div class="form-group">
                        <label for="passwordConfirm">确认密码</label>
                        <input type="password" id="passwordConfirm" class="form-control" placeholder="请再次输入密码" required>
                        <div class="error-message" id="passwordConfirmError">两次输入的密码不一致</div>
                    </div>
                </div>
                <div class="form-agree">
                    <input type="checkbox" id="agree" required>
                    <label for="agree">我已阅读并同意<a href="#">《用户服务协议》</a>和<a href="#">《隐私政策》</a></label>
                </div>
                <button type="submit" class="btn-register">注册账号</button>
                <div class="login-link">
                    已有账号？<a href="login.html">立即登录</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 短信验证码倒计时功能
        const btnSms = document.getElementById('btnSms');
        let countdown = 0;
        btnSms.addEventListener('click', function() {
            const phone = document.getElementById('phone').value.trim();
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                document.getElementById('phoneError').style.display = 'block';
                return;
            }
            document.getElementById('phoneError').style.display = 'none';

            // 倒计时逻辑
            if (countdown === 0) {
                countdown = 60;
                btnSms.disabled = true;
                btnSms.classList.add('disabled');
                btnSms.textContent = `重新发送(${countdown}s)`;

                const timer = setInterval(() => {
                    countdown--;
                    btnSms.textContent = `重新发送(${countdown}s)`;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        btnSms.disabled = false;
                        btnSms.classList.remove('disabled');
                        btnSms.textContent = '获取验证码';
                    }
                }, 1000);

                // 模拟发送短信验证码（实际项目中对接短信API）
                console.log(`向手机号 ${phone} 发送验证码`);
                alert('验证码已发送到您的手机，请注意查收');
            }
        });

        // 表单验证
        const registerForm = document.getElementById('registerForm');
        const username = document.getElementById('username');
        const phone = document.getElementById('phone');
        const email = document.getElementById('email');
        const smsCode = document.getElementById('smsCode');
        const password = document.getElementById('password');
        const passwordConfirm = document.getElementById('passwordConfirm');

        const usernameError = document.getElementById('usernameError');
        const phoneError = document.getElementById('phoneError');
        const emailError = document.getElementById('emailError');
        const smsCodeError = document.getElementById('smsCodeError');
        const passwordError = document.getElementById('passwordError');
        const passwordConfirmError = document.getElementById('passwordConfirmError');

        registerForm.addEventListener('submit', function(e) {
            e.preventDefault();
            let isValid = true;

            // 用户名验证
            if (username.value.length < 3 || username.value.length > 20) {
                usernameError.style.display = 'block';
                isValid = false;
            } else {
                usernameError.style.display = 'none';
            }

            // 手机号验证
            if (!/^1[3-9]\d{9}$/.test(phone.value.trim())) {
                phoneError.style.display = 'block';
                isValid = false;
            } else {
                phoneError.style.display = 'none';
            }

            // 邮箱验证（可选）
            if (email.value.trim() && !/^[\w.-]+@[a-zA-Z0-9-]+\.[a-zA-Z]+$/.test(email.value.trim())) {
                emailError.style.display = 'block';
                isValid = false;
            } else {
                emailError.style.display = 'none';
            }

            // 验证码验证
            if (smsCode.value.trim().length !== 6) {
                smsCodeError.style.display = 'block';
                isValid = false;
            } else {
                smsCodeError.style.display = 'none';
            }

            // 密码验证
            if (password.value.length < 6 || password.value.length > 20) {
                passwordError.style.display = 'block';
                isValid = false;
            } else {
                passwordError.style.display = 'none';
            }

            // 确认密码验证
            if (password.value !== passwordConfirm.value) {
                passwordConfirmError.style.display = 'block';
                isValid = false;
            } else {
                passwordConfirmError.style.display = 'none';
            }

            // 验证通过，提交表单（对接Django后端）
            if (isValid) {
                const formData = {
                    username: username.value.trim(),
                    phone: phone.value.trim(),
                    email: email.value.trim(),
                    sms_code: smsCode.value.trim(),
                    password: password.value,
                    password_confirm: passwordConfirm.value
                };

                // 发送请求到Django后端（替换为你的API地址）
                fetch('http://localhost:8000/api/v1/users/register/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.id) {
                        alert('注册成功！即将跳转到登录页');
                        window.location.href = 'login.html';
                    } else {
                        alert(data.msg || '注册失败，请检查信息');
                    }
                })
                .catch(error => {
                    console.error('注册失败:', error);
                    alert('网络错误，请重试');
                });
            }
        });
    </script>
</body>
</html>
