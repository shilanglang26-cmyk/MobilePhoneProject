<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机配件销售系统 - 后台登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 40px 30px;
            position: relative;
        }
        .login-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h2 {
            color: #333;
            font-size: 24px;
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .verify-code {
            display: flex;
            gap: 10px;
        }
        .verify-code .form-control {
            flex: 1;
        }
        .code-img {
            width: 120px;
            height: 45px;
            background: #f5f5f5;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
        .form-checkbox {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }
        .form-checkbox input {
            margin-right: 8px;
        }
        .form-checkbox label {
            margin-bottom: 0;
            color: #666;
            font-size: 14px;
        }
        .btn-login {
            width: 100%;
            height: 48px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
        .link-group {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 14px;
        }
        .link-group a {
            color: #667eea;
            text-decoration: none;
        }
        .link-group a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #dc3545;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        @media (max-width: 576px) {
            .login-card {
                padding: 30px 20px;
            }
            .verify-code .code-img {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h2>手机配件销售系统 - 后台管理</h2>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名/手机号</label>
                    <input type="text" id="username" class="form-control" placeholder="请输入用户名或手机号" required>
                    <div class="error-message" id="usernameError">请输入有效的用户名或手机号</div>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-control" placeholder="请输入密码" required>
                    <div class="error-message" id="passwordError">密码长度不能少于6位</div>
                </div>
                <div class="verify-code">
                    <div class="form-group" style="margin-bottom: 0; flex: 1;">
                        <label for="verifyCode">验证码</label>
                        <input type="text" id="verifyCode" class="form-control" placeholder="请输入验证码" required>
                        <div class="error-message" id="verifyCodeError">请输入正确的验证码</div>
                    </div>
                    <div class="code-img" id="codeImg">8A3K</div>
                </div>
                <div class="form-checkbox">
                    <input type="checkbox" id="remember">
                    <label for="remember">记住我（7天内自动登录）</label>
                </div>
                <button type="submit" class="btn-login">登录</button>
                <div class="link-group">
                    <a href="register.html">注册账号</a>
                    <a href="#">忘记密码？</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 验证码刷新功能
        const codeImg = document.getElementById('codeImg');
        codeImg.addEventListener('click', function() {
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let code = '';
            for (let i = 0; i < 4; i++) {
                code += chars[Math.floor(Math.random() * chars.length)];
            }
            this.textContent = code;
        });

        // 表单验证
        const loginForm = document.getElementById('loginForm');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const verifyCode = document.getElementById('verifyCode');
        const usernameError = document.getElementById('usernameError');
        const passwordError = document.getElementById('passwordError');
        const verifyCodeError = document.getElementById('verifyCodeError');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            let isValid = true;

            // 用户名验证
            if (!username.value.trim()) {
                usernameError.style.display = 'block';
                isValid = false;
            } else {
                usernameError.style.display = 'none';
            }

            // 密码验证
            if (password.value.length < 6) {
                passwordError.style.display = 'block';
                isValid = false;
            } else {
                passwordError.style.display = 'none';
            }

            // 验证码验证（简单校验长度）
            if (verifyCode.value.trim().length !== 4) {
                verifyCodeError.style.display = 'block';
                isValid = false;
            } else {
                verifyCodeError.style.display = 'none';
            }

            // 验证通过，提交表单（对接Django后端）
            if (isValid) {
                const formData = {
                    username: username.value.trim(),
                    password: password.value,
                    verify_code: verifyCode.value.trim(),
                    remember: document.getElementById('remember').checked
                };

                // 发送请求到Django后端（替换为你的API地址）
                fetch('http://localhost:8000/api/v1/users/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.token) {
                        // 存储token到本地存储
                        localStorage.setItem('token', data.token);
                        // 跳转到后台首页
                        window.location.href = 'dashboard.html';
                    } else {
                        alert(data.msg || '登录失败，请检查账号密码');
                    }
                })
                .catch(error => {
                    console.error('登录失败:', error);
                    alert('网络错误，请重试');
                });
            }
        });
    </script>
</body>
</html>
