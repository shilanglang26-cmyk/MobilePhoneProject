<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>支付管理</title>
  <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body onload="checkLogin();getOrders()">
  <div class="d-flex">
    <div class="bg-dark text-white p-3 vh-100" style="width:250px">
      <h4>管理菜单</h4>
      <a href="index.html" class="btn btn-outline-light w-100 mb-2">首页</a>
      <a href="user.html" class="btn btn-outline-light w-100 mb-2">用户管理</a>
      <a href="goods.html" class="btn btn-outline-light w-100 mb-2">商品管理</a>
      <a href="logistics.html" class="btn btn-outline-light w-100 mb-2">物流管理</a>
    </div>
    <div class="container p-5">
      <h3>订单支付管理</h3>
      <div id="order_list"></div>
    </div>
  </div>

<script>
async function getOrders() {
  document.getElementById('order_list').innerHTML = `
    <div class="card p-3">订单号：123456 | 金额：29.9 | <button onclick="pay()" class="btn btn-sm btn-success">去支付</button></div>`;
}
async function pay() {
  const res = await request('/orders/pay/', 'POST', { order_no: "123456" });
  alert(res.msg);
}
</script>
</body>
</html>
