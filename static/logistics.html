<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>物流管理</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <script src="common.js"></script>
    <style>.sidebar{position:fixed; width:240px; height:100vh; background:#222; color:white; padding:20px;} .main{margin-left:240px; padding:30px;}</style>
</head>
<body onload="checkLogin()">
    <div class="sidebar"><h4>管理后台</h4><a href="index.html" class="btn btn-outline-light w-100 mb-2">首页</a><a href="logistics.html" class="btn btn-light w-100 mb-2">物流管理</a></div>
    <div class="main">
        <h3>物流状态查询</h3>
        <input id="orderNo" placeholder="输入订单号" class="form-control w-50 mb-2">
        <button class="btn btn-info" onclick="getLogistics()">查询物流</button>
        <div id="logiInfo" class="alert alert-info mt-3"></div>
    </div>

<script>
async function getLogistics(){
    const orderNo = document.getElementById('orderNo').value;
    const data = await request(`/orders/logistics/${orderNo}/`);
    const status = ['待发货','已发货','运输中','派送中','已签收'];
    document.getElementById('logiInfo').innerHTML = `当前物流状态：<strong>${status[data.data.status]}</strong>`;
}
</script>
</body>
</html>
