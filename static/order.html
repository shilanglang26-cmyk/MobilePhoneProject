<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>订单支付</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <script src="common.js"></script>
    <style>.sidebar{position:fixed; width:240px; height:100vh; background:#222; color:white; padding:20px;} .main{margin-left:240px; padding:30px;}</style>
</head>
<body onload="checkLogin()">
    <div class="sidebar"><h4>管理后台</h4><a href="index.html" class="btn btn-outline-light w-100 mb-2">首页</a><a href="order.html" class="btn btn-light w-100 mb-2">订单支付</a></div>
    <div class="main">
        <h3>订单 & 支付管理</h3>
        <button class="btn btn-primary mb-3" onclick="createOrder()">创建订单（结算购物车）</button>
        <input id="orderNo" placeholder="请输入订单号" class="form-control w-50 mb-2">
        <button class="btn btn-success" onclick="payOrder()">模拟支付</button>
    </div>

<script>
async function createOrder(){
    const res = await request('/orders/create/','POST');
    alert('订单创建成功！订单号：'+res.order_no);
}
async function payOrder(){
    const orderNo = document.getElementById('orderNo').value;
    const res = await request('/orders/pay/','POST',{order_no:orderNo});
    alert(res.msg);
}
</script>
</body>
</html>
