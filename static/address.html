<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>地址管理</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <script src="common.js"></script>
    <style>.sidebar{position:fixed; width:240px; height:100vh; background:#222; color:white; padding:20px;} .main{margin-left:240px; padding:30px;}</style>
</head>
<body onload="checkLogin();getAddressList()">
    <div class="sidebar">
        <h4>管理后台</h4>
        <a href="index.html" class="btn btn-outline-light w-100 mb-2">首页</a>
        <a href="user.html" class="btn btn-outline-light w-100 mb-2">用户管理</a>
        <a href="address.html" class="btn btn-light w-100 mb-2">地址管理</a>
        <a href="goods.html" class="btn btn-outline-light w-100 mb-2">商品管理</a>
    </div>
    <div class="main">
        <h3>收货地址管理</h3>
        <div class="card p-3 mt-3">
            <input id="receiver" placeholder="收件人" class="form-control mb-2">
            <input id="phone" placeholder="手机号" class="form-control mb-2">
            <input id="address" placeholder="详细地址" class="form-control mb-2">
            <button class="btn btn-success" onclick="addAddress()">添加地址</button>
        </div>
        <div class="mt-4" id="addressList"></div>
    </div>

<script>
async function getAddressList(){
    const data = await request('/users/address/');
    let html = '';
    data.forEach(item=>{
        html+=`<div class="card p-3 mb-2">
            <p>收件人：${item.receiver} | 电话：${item.phone} | 地址：${item.address}</p>
            <button class="btn btn-danger btn-sm" onclick="delAddress(${item.id})">删除</button>
        </div>`;
    });
    document.getElementById('addressList').innerHTML = html;
}
async function addAddress(){
    const data = {
        receiver:document.getElementById('receiver').value,
        phone:document.getElementById('phone').value,
        address:document.getElementById('address').value,
        is_default:true
    };
    await request('/users/address/','POST',data);
    getAddressList();
}
async function delAddress(id){
    await request(`/users/address/${id}/`,'DELETE');
    getAddressList();
}
</script>
</body>
</html>
