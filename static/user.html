<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <script src="common.js"></script>
    <style>.sidebar{position:fixed; width:240px; height:100vh; background:#222; color:white; padding:20px;} .main{margin-left:240px; padding:30px;}</style>
</head>
<body onload="checkLogin();getUserInfo()">
    <div class="sidebar">
        <h4>管理后台</h4>
        <a href="index.html" class="btn btn-outline-light w-100 mb-2">首页</a>
        <a href="user.html" class="btn btn-light w-100 mb-2">用户管理</a>
        <a href="address.html" class="btn btn-outline-light w-100 mb-2">地址管理</a>
        <a href="goods.html" class="btn btn-outline-light w-100 mb-2">商品管理</a>
        <button class="btn btn-danger w-100 mt-4" onclick="logout()">退出</button>
    </div>
    <div class="main">
        <h3>用户信息管理</h3>
        <div class="card shadow-sm p-4 mt-3">
            <div class="mb-3"><label>用户名</label><input id="username" class="form-control"></div>
            <div class="mb-3"><label>手机号</label><input id="phone" class="form-control"></div>
            <div class="mb-3"><label>账户余额</label><input id="balance" class="form-control" disabled></div>
            <div class="mb-3"><label>新密码（不修改留空）</label><input type="password" id="password" class="form-control"></div>
            <button class="btn btn-primary" onclick="updateUser()">保存修改</button>
        </div>
    </div>

<script>
async function getUserInfo(){
    const data = await request('/users/manage/');
    document.getElementById('username').value = data.username;
    document.getElementById('phone').value = data.phone;
    document.getElementById('balance').value = data.balance;
}
async function updateUser(){
    const data = {
        username:document.getElementById('username').value,
        phone:document.getElementById('phone').value
    };
    const pwd = document.getElementById('password').value;
    if(pwd) data.password = pwd;
    await request('/users/manage/','PUT',data);
    alert('修改成功！');
}
</script>
</body>
</html>
