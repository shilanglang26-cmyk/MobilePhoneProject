<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>后台主页</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <script src="common.js"></script>
    <style>
        .sidebar{width:240px; background:#212529; min-height:100vh; color:white; padding:20px; position:fixed; left:0; top:0;}
        .main{margin-left:240px; padding:30px; background:#f5f7fa; min-height:100vh;}
        .menu-btn{width:100%; margin-bottom:8px; text-align:left;}

<body onload="checkLogin()">

    </div>
    <div class="main">
        <div class="card p-4 shadow-sm">
            <h1 class="text-primary">欢迎使用手机配件销售系统</h1>
