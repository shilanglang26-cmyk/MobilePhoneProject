<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <script src="common.js"></script>
    <style>
        body{background: #f5f7fa; display: grid; place-items: center; height: 100vh; margin:0;}
        .reg-box{width:420px; background:white; padding:30px; border-radius:12px; box-shadow:0 4px 20px #00000010;}
    </style>
</head>
<body>
<div class="reg-box">
    <h3 class="text-center mb-4 text-success">用户注册</h3>
    <div class="mb-3"><label>用户名</label><input id="username" class="form-control"></div>
    <div class="mb-3"><label>手机号</label><input id="phone" class="form-control"></div>
    <div class="mb-3"><label>密码</label><input type="password" id="password" class="form-control"></div>
    <button class="btn btn-success w-100" onclick="register()">注册</button>
    <div class="text-center mt-3"><a href="login.html" class="text-decoration-none">已有账号？去登录</a></div>
</div>

    <script src="common.js"></script>
<script>
async function register(){
    const data = {
        username:document.getElementById('username').value,
        phone:document.getElementById('phone').value,
        password:document.getElementById('password').value
    };
    const res = await fetch(BASE_URL+'/users/register/',{
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
    });
    const result = await res.json();
    alert(result.msg);
    if(result.code===200) window.location.href='login.html';
}
</script>
</body>
</html>
